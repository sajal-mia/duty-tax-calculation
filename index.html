<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Tax Calculator</title>
    <style>
        :root {
            --primary: #341f97; --secondary: #5f27cd; --success: #2ecc71;
            --danger: #ee5253; --warning: #ff9f43; --info: #2e86de;
            --dark: #222f3e; --light: #f1f2f6;
            --bg-body: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --bg-card: #ffffff; --bg-input: #ffffff;
            --bg-table-head: #f8fafc; --text-main: #2f3542;
            --text-muted: #57606f; --border-color: #edf2f7; --plum: #833471;
        }
        [data-theme="dark"] {
            --primary: #a29bfe; --secondary: #d63031; --success: #00b894;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --bg-card: #1e293b; --bg-input: #334155;
            --bg-table-head: #334155; --text-main: #f8fafc;
            --text-muted: #94a3b8; --border-color: #334155;
        }
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 10px; background: var(--bg-body);
            min-height: 100vh; color: var(--text-main);
        }
        .app-container { 
            max-width: 100%; margin: 0 auto; background: var(--bg-card); padding: 15px; 
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header-bar { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding-bottom: 12px; margin-bottom: 15px; border-bottom: 2px solid var(--border-color);
        }
        .header-title h2 { margin: 0; color: var(--primary); font-size: 20px; font-weight: 800; }
        .config-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; 
            background: var(--light); padding: 15px; border-radius: 10px; margin-bottom: 15px; 
        }
        .config-item label { 
            font-weight: 700; font-size: 11px; color: var(--text-muted); 
            margin-bottom: 4px; text-transform: uppercase; display: block;
        }
        .config-item input { 
            padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; 
            font-size: 13px; font-weight: 600; width: 100%; box-sizing: border-box;
            background: var(--bg-input); color: var(--text-main);
        }
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { 
            background: var(--bg-table-head); color: var(--text-muted); font-size: 10px; 
            font-weight: 800; text-transform: uppercase; padding: 10px 4px; border-bottom: 2px solid var(--border-color);
        }
        td { padding: 6px 4px; border-bottom: 1px solid var(--border-color); text-align: center; font-size: 12px; }
        .in-field { 
            padding: 5px 6px; border: 1px solid var(--border-color); border-radius: 4px; 
            font-size: 12px; text-align: center; width: 100%; box-sizing: border-box;
            background: var(--bg-input); color: var(--text-main);
        }
        .item-name-badge { font-weight: 600; font-size: 10px; color: var(--info); }
        .button-tray { display: flex; gap: 8px; margin-top: 15px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; color: white; }
        .dashboard { margin-top: 20px; background: var(--bg-card); border-radius: 12px; border: 2px solid var(--primary); padding: 15px; }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; }
        .grand-total-val { font-size: 28px; font-weight: 900; color: var(--success); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header-bar">
        <div class="header-title"><h2>Duty Tax Calculator</h2></div>
    </header>

    <div class="config-grid">
        <div class="config-item">
            <label>Exchange Rate (BDT)</label>
            <input type="number" id="exRate" value="122.70" step="0.01" oninput="calculateAll()">
        </div>
        <div class="config-item">
            <label>Insurance Rate (%)</label>
            <input type="number" id="insRate" value="1.00" step="0.01" oninput="calculateAll()" placeholder="Rate %">
        </div>
        <div class="config-item">
            <label>Stamp Charges (BDT)</label>
            <input type="number" id="stampCharge" value="0.00" step="1" oninput="calculateAll()" placeholder="Fixed BDT Amount">
        </div>
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>HS Code</th>
                    <th>Item Price</th>
                    <th>Adj.</th>
                    <th>SRO Mode</th>
                    <th>Description</th>
                    <th>AV (BDT)</th>
                    <th>CD</th>
                    <th>RD</th>
                    <th>SD</th>
                    <th>VAT</th>
                    <th>AIT</th>
                    <th>AT</th>
                    <th>Total Taxes</th>
                    <th class="no-print">Del</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="calc-row">
                    <td><input type="text" class="in-hs in-field" oninput="lookupTariff(this)" placeholder="HS Code"></td>
                    <td><input type="number" class="in-price in-field" oninput="calculateAll()" placeholder="0.00"></td>
                    <td><input type="number" class="in-adj in-field" oninput="calculateAll()" value="1.00" step="0.01"></td>
                    <td>
                        <select class="in-sro in-field" onchange="calculateAll()">
                            <option value="n">Regular</option>
                            <option value="y">SRO Benefit</option>
                            <option value="b">1% Privilege</option>
                        </select>
                    </td>
                    <td><span class="item-info item-name-badge">---</span></td>
                    <td class="out-av" style="font-weight: 700; color: var(--primary);">0.00</td>
                    <td><span class="tax-v out-cd">0.00</span></td>
                    <td><span class="tax-v out-rd">0.00</span></td>
                    <td><span class="tax-v out-sd">0.00</span></td>
                    <td><span class="tax-v out-vat">0.00</span></td>
                    <td><span class="tax-v out-ait">0.00</span></td>
                    <td><span class="tax-v out-at">0.00</span></td>
                    <td style="font-weight: 800; color: var(--primary);" class="out-row-total">0.00</td>
                    <td class="no-print"><button class="btn" style="background:var(--danger)" onclick="removeRow(this)">×</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="button-tray no-print">
        <button class="btn" style="background:var(--success)" onclick="addNewRow()">+ Add Line</button>
        <button class="btn" style="background:var(--info)" onclick="calculateAll()">Calculate</button>
        <button class="btn" style="background:var(--warning)" onclick="location.reload()">Reset All</button>
    </div>

    <div class="dashboard">
        <div class="metric-grid">
            <div class="metric-card"><label>Total CD</label><div class="value" id="sum-cd">0.00</div></div>
            <div class="metric-card"><label>Total VAT</label><div class="value" id="sum-vat">0.00</div></div>
            <div class="metric-card"><label>GRAND TOTAL TAXES (BDT)</label><div class="grand-total-val" id="sum-grand">0.00</div></div>
        </div>
    </div>
</div>

<script>
    const tariffDB = { 
        "60062200": { name: "FABRICS OF COTTON DYED", cd: 0.25, rd: 0.03, sd: 0.1, vat: 0.15, ait: 0.05, at: 0.02 },
        "84171000": { name: "FURNACES AND OVENS", cd: 0.01, rd: 0, sd: 0, vat: 0.15, ait: 0.05, at: 0.075 }
    };

    function lookupTariff(input) {
        const row = input.closest('tr');
        const code = input.value.trim();
        const info = row.querySelector('.item-info');
        if(tariffDB[code]) {
            info.innerText = tariffDB[code].name;
            calculateAll();
        } else { info.innerText = "---"; }
    }

    function calculateAll() {
        const exRate = parseFloat(document.getElementById('exRate').value) || 0;
        const insRate = (parseFloat(document.getElementById('insRate').value) || 0) / 100;
        const stampCharge = parseFloat(document.getElementById('stampCharge').value) || 0;
        
        let totals = { cd: 0, vat: 0, grand: 0 };

        document.querySelectorAll('.calc-row').forEach(row => {
            const hs = row.querySelector('.in-hs').value.trim();
            const price = parseFloat(row.querySelector('.in-price').value) || 0;
            const adj = parseFloat(row.querySelector('.in-adj').value) || 1;
            const sro = row.querySelector('.in-sro').value;

            let r = tariffDB[hs] || { cd:0, rd:0, sd:0, vat:0, ait:0, at:0 };
            if(sro === 'y') r = { ...r, cd: 0.05, rd: 0, sd: 0 };
            if(sro === 'b') r = { ...r, cd: 0.01, rd: 0, sd: 0 };

            // Logic: CIF = (CFR) + Insurance + Stamp Charge (Fixed BDT)
            const cfr = (price * adj) * exRate;
            const insurance = cfr * insRate;
            const cif = cfr + insurance + stampCharge; // Stamp charges added directly
            
            // Note: Landing charge is usually 1% of CIF, but per your request 
            // we are using the fixed Stamp Charge instead of a landing % formula.
            const av = cif; 

            const cd = av * r.cd;
            const rd = av * r.rd;
            const sd = (av + cd + rd) * r.sd;
            const vat = (av + cd + rd + sd) * r.vat;
            const ait = av * r.ait;
            const at = (av + cd + rd + sd) * r.at;
            const rowTotal = cd + rd + sd + vat + ait + at;

            row.querySelector('.out-av').innerText = av.toLocaleString(undefined, {minimumFractionDigits: 2});
            row.querySelector('.out-cd').innerText = cd.toLocaleString(undefined, {minimumFractionDigits: 2});
            row.querySelector('.out-rd').innerText = rd.toLocaleString(undefined, {minimumFractionDigits: 2});
            row.querySelector('.out-sd').innerText = sd.toLocaleString(undefined, {minimumFractionDigits: 2});
            row.querySelector('.out-vat').innerText = vat.toLocaleString(undefined, {minimumFractionDigits: 2});
            row.querySelector('.out-ait').innerText = ait.toLocaleString(undefined, {minimumFractionDigits: 2});
            row.querySelector('.out-at').innerText = at.toLocaleString(undefined, {minimumFractionDigits: 2});
            row.querySelector('.out-row-total').innerText = rowTotal.toLocaleString(undefined, {minimumFractionDigits: 2});

            totals.cd += cd; totals.vat += vat; totals.grand += rowTotal;
        });

        document.getElementById('sum-cd').innerText = totals.cd.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('sum-vat').innerText = totals.vat.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('sum-grand').innerText = totals.grand.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    function addNewRow() {
        const body = document.getElementById('tableBody');
        const newRow = body.rows[0].cloneNode(true);
        newRow.querySelectorAll('input').forEach(i => { if(!i.classList.contains('in-adj')) i.value = ''; });
        body.appendChild(newRow);
    }

    function removeRow(btn) {
        if(document.querySelectorAll('.calc-row').length > 1) {
            btn.closest('tr').remove();
            calculateAll();
        }
    }
</script>
</body>
</html>
